version: '3.8'

services:
  helloworld:
    image: 172.25.65.138:5000/helloworld:latest
    container_name: spring-boot-helloworld
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - STUDENT_NAME=${STUDENT_NAME:-Wilson Nguyen}
      - STUDENT_ID=${STUDENT_ID:-S12345}
      - DB_HOST=${DB_HOST:-172.25.64.1}
      - DB_PORT=5433
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=1234
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


