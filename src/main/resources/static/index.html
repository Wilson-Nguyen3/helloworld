<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilson's School Roster</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <h1 id="title-heading">Welcome to Wilson's School</h1>
    </header>

    <main class="main-container">
        <!-- Auth Card Container -->
        <div class="glass-card" id="form-container">
            <div class="tabs-header">
                <button class="tab-btn active" id="tab-login">Sign In</button>
                <button class="tab-btn" id="tab-register">New Student</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <h2 class="form-title">Student Sign In</h2>
                
                <div class="input-group">
                    <label for="login-id">Student ID</label>
                    <input type="text" id="login-id" placeholder="e.g. S10001" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required autocomplete="off">
                </div>

                <button type="submit" class="submit-btn" id="btn-login">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <h2 class="form-title">New Student Registration</h2>
                
                <div class="input-group">
                    <label for="reg-name">Student Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="reg-id">Student ID</label>
                    <input type="text" id="reg-id" placeholder="e.g. S10001" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="reg-dob">Date of Birth</label>
                    <input type="text" id="reg-dob" placeholder="MM/DD/YY" required autocomplete="off" maxlength="10">
                </div>

                <div class="input-group">
                    <label for="reg-password">Password (Optional)</label>
                    <input type="password" id="reg-password" placeholder="Defaults to Student ID" autocomplete="off">
                </div>

                <button type="submit" class="submit-btn" id="btn-register">Register & Sign Up</button>
            </form>

            <div id="message-area" class="message-container"></div>
        </div>

        <!-- Directory Table Container -->
        <div class="directory-container">
            <h2 class="directory-title">Logins Directory (PostgreSQL Roster)</h2>
            <div class="table-wrapper">
                <table class="roster-table" id="roster-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Student ID</th>
                            <th>Date of Birth</th>
                            <th>Default Login Password</th>
                        </tr>
                    </thead>
                    <tbody id="roster-tbody">
                        <tr>
                            <td colspan="4" class="empty-state">No students registered yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="roster-badge" id="roster-badge-container">
        <span class="badge-label">TOTAL ROSTER</span>
        <span class="badge-count" id="roster-count">0</span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
