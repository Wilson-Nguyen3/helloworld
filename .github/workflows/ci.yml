name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: [self-hosted, linux, docker]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Run tests
      run: mvn test

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: target/*.jar

    - name: Build Docker image
      run: docker build -t 172.25.65.138:5000/helloworld:latest -t 172.25.65.138:5000/helloworld:${{ github.sha }} .

    - name: Push to local registry
      if: github.event_name != 'pull_request'
      run: |
        docker push 172.25.65.138:5000/helloworld:latest
        docker push 172.25.65.138:5000/helloworld:${{ github.sha }}
